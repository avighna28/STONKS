<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stonks: USD to INR Converter</title>
    <meta name="description" content="Exchange USD to INR with Gen Z aesthetic. Quick, sleek, and bussin' exchange rates.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-container">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1 class="logo">STONKS<span>.</span></h1>
            <p class="tagline">Check current USD to INR rates!</p>
        </header>

        <section class="glass-card">
            <div class="input-group">
                <label for="usd-amount">USD (Dollar)</label>
                <div class="input-wrapper">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="usd-amount" placeholder="Enter amount..." step="0.01" min="0">
                </div>
            </div>

            <div class="swap-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
            </div>

            <div class="input-group">
                <label for="inr-amount">INR (Rupees)</label>
                <div class="input-wrapper result-wrapper">
                    <span class="currency-symbol">₹</span>
                    <input type="text" id="inr-amount" placeholder="Waiting for input..." readonly>
                </div>
            </div>

            <div class="info-footer">
                <p id="exchange-rate-info">Exchange rate: Fetching... 🚀</p>
                <button id="refresh-btn" class="btn-refresh">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                </button>
            </div>
        <footer class="footer">
            <p>Made for the Gen Z hustle 💸</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
